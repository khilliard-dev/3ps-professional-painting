<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 3P's Professional Painting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <h1 class="logo">3P's Professional Painting</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <div class="container fade-in">
        <section class="contact-header">
            <h2>Get in Touch</h2>
            <p>Have a project in mind? Reach out for a free quote.</p>
        </section>

        <section class="contact-info">
            <p><strong>Phone:</strong> (803) 225‑2310</p>
            <p><strong>Email:</strong> 3psprofessionalpainting.com</p>
        </section>

        <section class="contact-form-section">
            <h3>Send us a Message</h3>
            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="cta-btn">Send Message</button>
            </form>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
